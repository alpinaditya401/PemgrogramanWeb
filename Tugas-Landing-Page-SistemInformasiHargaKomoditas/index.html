<!doctype html> <!-- Baris ini memberi tahu browser bahwa dokumen ini menggunakan HTML5. Ini sangat penting agar browser dapat merender halaman dengan benar -->
<html lang="id"><!--  Ini adalah elemen akar (root) dari seluruh halaman web. Atribut lang="id" menunjukkan bahwa konten utama pada halaman ini menggunakan bahasa Indonesia. -->
  <head> <!-- Bagian ini berisi informasi meta (data tentang data) dari halaman web yang tidak akan ditampilkan langsung di dalam halaman utama browser. -->
    <meta charset="UTF-8" /> <!-- Menentukan karakter encoding UTF-8, yang mendukung hampir semua simbol dan karakter huruf di dunia. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /><!--  Tag ini membuat halaman web menjadi responsif (menyesuaikan tampilan di perangkat seluler seperti smartphone dan tablet). -->
    <link rel="stylesheet" href="style.css" /> <!-- Menghubungkan file HTML ini dengan file CSS eksternal bernama style.css yang digunakan untuk mempercantik tampilan halaman (warna, tata letak, dll). -->
    <title>Sistem Informasi Hasil Pangan</title> <!-- Menentukan teks judul yang akan muncul di tab browser Anda. -->
  </head>
  <body> <!-- Bagian ini berisi semua konten yang bisa dilihat langsung oleh pengguna di halaman web. -->
    <div class="container"> 
      <!-- Sebuah kotak atau bungkus (wrapper) utama yang menampung seluruh konten web. Class container biasanya digunakan di CSS untuk mengatur posisi konten agar berada di tengah dan memiliki batas lebar tertentu. -->
      <header>
        <img src="https://www.jurnalpangan.com/public/journals/1/submission_794_762_coverImage_en.jpg" alt="Gambar Pangan" />
        <!--  Menampilkan gambar cover yang diambil dari link internet. Atribut alt berfungsi sebagai teks alternatif jika gambar gagal dimuat. -->
        <h1><!-- Selamat Datang di Sistem Informasi Hasil Pangan</h1> Merupakan judul utama halaman dengan ukuran teks paling besar (Heading 1) yang berbunyi "Selamat Datang di Sistem Informasi Hasil Pangan". -->
      </header>

      <h2><!-- Daftar Hasil Pangan</h2> Judul bagian (Heading 2) untuk tabel. -->
      <table> <!-- Tag pembuka untuk membuat tabel. -->
        <thead> <!-- Bagian kepala tabel yang berisi nama-nama kolom. -->
          <tr> <!-- (Table Row): Membuat baris tabel. -->
            <th>No</th> <!-- (Table Heading): Membuat sel judul kolom (No, Nama Hasil Pangan, Jumlah, Harga, Lokasi). Teks di dalamnya biasanya akan otomatis tebal (bold). -->
            <th>Nama Hasil Pangan</th>
            <th>Jumlah</th>
            <th>Harga (IDR)</th>
            <th>Lokasi</th>
          </tr>
        </thead>
        <tbody> <!-- Bagian isi tabel yang berisi data-data pangan. -->
          <tr> <!-- Terdapat beberapa elemen <tr> yang di dalamnya terdapat elemen  -->
            <td>1</td> <!-- (Table Data). Ini mewakili baris dan sel data. Contoh data yang dimasukkan adalah Beras, Cabai Merah, dan Sayur Bayam lengkap dengan detailnya. -->
            <td>Berat Beras</td>
            <td>500 kg</td>
            <td>10.000.000</td>
            <td>Jakarta</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Cabai Merah</td>
            <td>200 kg</td>
            <td>3.500.000</td>
            <td>Surabaya</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Sayur Bayam</td>
            <td>100 kg</td>
            <td>1.000.000</td>
            <td>Bandung</td>
          </tr>
        </tbody>
      </table>

      <a href="https://infoharga.bappebti.go.id/" target="_blank" class="btn-resmi"> Lihat Hasil Pangan Lainnya </a>  
      <a><!--  adalah Tombol Tautan Eksternal  -->
        <!-- target="_blank" membuat link tersebut akan terbuka di tab browser baru ketika diklik.  -->
       <!--  class="btn-resmi" digunakan agar link ini bisa didesain tampak seperti tombol menggunakan CSS. -->

      <div class="form-section"> <!-- Bagian ini digunakan agar pengguna bisa menginput data pangan baru. -->
        <h2>Input Data Hasil Pangan</h2>
        <form name="myForm" onsubmit="inputData(event)"> 
         <!--  Tag untuk membuat formulir. Atribut onsubmit="inputData(event)" berarti ketika formulir disubmit (dikirim), ia akan memanggil sebuah fungsi JavaScript bernama inputData(). -->
          <label for="nama_input" style="display: block; margin-bottom: 10px">Masukkan Nama Hasil Pangan:</label>
          <!-- Memberikan keterangan teks untuk kolom inputan di bawahnya. -->
          <input type="text" id="nama_input" name="nama" placeholder="Contoh: Beras" required />
         <!--  Kolom isian teks biasa untuk menginput "Nama Hasil Pangan". -->
          <label for="jumlah_input" style="display: block; margin-bottom: 10px">Masukkan Jumlah:</label>
          <input type="number" id="jumlah_input" name="jumlah" placeholder="Contoh: 100 kg" required />
          <!-- Kolom isian khusus angka untuk menginput "Jumlah". -->
          <button type="submit">Tambah Data</button>
          <!-- Tombol untuk mengeksekusi pengiriman formulir. -->
        </form>
      </div>
    </div>
    <script src="scripts.js"></script> <!-- File ini berisi kode logika, contohnya untuk menangani fungsi inputData(event) agar data yang dimasukkan ke form tadi bisa diproses -->
  </body>
</html>
